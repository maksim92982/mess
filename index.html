<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Семейный видеочат</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 8px;
        }

        .room-info {
            background: #f0f0f0;
            padding: 15px;
            text-align: center;
            font-size: 14px;
        }

        .room-info code {
            background: #fff;
            padding: 8px 12px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 14px;
            display: inline-block;
            margin: 10px 0;
            word-break: break-all;
            border: 1px solid #ccc;
        }

        .videos-container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            padding: 20px;
            background: #1a1a2e;
        }

        .video-wrapper {
            flex: 1;
            min-width: 300px;
            position: relative;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            aspect-ratio: 16 / 9;
        }

        .video-wrapper video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .video-label {
            position: absolute;
            bottom: 12px;
            left: 12px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
        }

        .controls {
            padding: 20px;
            background: white;
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 24px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-danger {
            background: #dc3545;
            color: white;
        }

        .status {
            padding: 12px 20px;
            text-align: center;
            font-size: 14px;
            background: #f8f9fa;
            color: #666;
            font-family: monospace;
        }

        .status.connected {
            background: #d4edda;
            color: #155724;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
        }

        .copy-btn {
            background: #28a745;
            color: white;
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-left: 10px;
        }

        @media (max-width: 768px) {
            .videos-container {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>👨‍👩‍👧 Семейный видеочат</h1>
            <p>Просто зайдите по одной ссылке и начните общаться</p>
        </div>
        
        <div class="room-info">
            🔗 Ваша ссылка для общения:
            <div>
                <code id="roomUrl">Загрузка...</code>
                <button class="copy-btn" onclick="copyRoomUrl()">📋 Копировать</button>
            </div>
            <small style="display: block; margin-top: 8px;">👉 Отправьте эту ссылку собеседнику</small>
        </div>
        
        <div class="videos-container">
            <div class="video-wrapper">
                <video id="localVideo" autoplay muted playsinline></video>
                <div class="video-label">📹 Вы</div>
            </div>
            <div class="video-wrapper">
                <video id="remoteVideo" autoplay playsinline></video>
                <div class="video-label">👤 Собеседник</div>
            </div>
        </div>
        
        <div class="controls">
            <button id="toggleAudio" class="btn-primary">🔊 Выключить звук</button>
            <button id="toggleVideo" class="btn-primary">📷 Выключить видео</button>
            <button id="hangupBtn" class="btn-danger">📞 Завершить звонок</button>
        </div>
        
        <div class="status" id="status">
            🟡 Инициализация...
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
                "firebase/database": "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js"
            }
        }
    </script>

    <script type="module">
        // ============================================
        // КОНФИГУРАЦИЯ FIREBASE - ВАШИ ДАННЫЕ
        // ============================================
        const firebaseConfig = {
            apiKey: "AIzaSyACxxdZ4YuxQeHzKFerNEWYyiERt4hM6jc",
            authDomain: "project-8146930540921453224.firebaseapp.com",
            databaseURL: "https://project-8146930540921453224-default-rtdb.firebaseio.com",
            projectId: "project-8146930540921453224",
            storageBucket: "project-8146930540921453224.firebasestorage.app",
            messagingSenderId: "1064559998349",
            appId: "1:1064559998349:web:9d16552a7ee18661f2b9c4"
        };
        
        import { initializeApp } from 'firebase/app';
        import { getDatabase, ref, set, onValue, push, remove, onDisconnect, serverTimestamp } from 'firebase/database';
        
        // Инициализация Firebase
        let db;
        let roomRef;
        let messagesRef;
        let clientsRef;
        
        try {
            const app = initializeApp(firebaseConfig);
            db = getDatabase(app);
            console.log('✅ Firebase инициализирован');
            document.getElementById('status').textContent = '🟢 Firebase подключен! Запрос доступа к камере...';
        } catch (error) {
            console.error('❌ Ошибка инициализации Firebase:', error);
            document.getElementById('status').textContent = '❌ Ошибка: Firebase не настроен. Проверьте конфигурацию!';
            document.getElementById('status').classList.add('error');
        }
        
        // ============================================
        // WebRTC конфигурация
        // ============================================
        const configuration = {
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' },
                { urls: 'stun:stun2.l.google.com:19302' },
                { urls: 'stun:stun3.l.google.com:19302' },
                { urls: 'stun:stun4.l.google.com:19302' },
                {
                    urls: 'turn:openrelay.metered.ca:80',
                    username: 'openrelayproject',
                    credential: 'openrelayproject'
                },
                {
                    urls: 'turn:openrelay.metered.ca:443',
                    username: 'openrelayproject',
                    credential: 'openrelayproject'
                }
            ]
        };
        
        // Глобальные переменные
        let peerConnection = null;
        let localStream = null;
        let roomId = null;
        let myClientId = null;
        
        // DOM элементы
        const localVideo = document.getElementById('localVideo');
        const remoteVideo = document.getElementById('remoteVideo');
        const statusDiv = document.getElementById('status');
        
        function updateStatus(message, type = 'info') {
            statusDiv.textContent = message;
            statusDiv.className = 'status';
            if (type === 'success') {
                statusDiv.classList.add('connected');
            } else if (type === 'error') {
                statusDiv.classList.add('error');
            }
            console.log(`[${type}] ${message}`);
        }
        
        // Получаем ID комнаты из URL
        function getRoomId() {
            let hash = window.location.hash.substring(1);
            if (!hash) {
                hash = Math.random().toString(36).substring(2, 8);
                window.location.hash = hash;
            }
            return hash;
        }
        
        function updateRoomUrl() {
            const url = window.location.href.split('#')[0] + '#' + roomId;
            document.getElementById('roomUrl').textContent = url;
        }
        
        window.copyRoomUrl = function() {
            const url = document.getElementById('roomUrl').textContent;
            navigator.clipboard.writeText(url);
            const btn = event.target;
            const originalText = btn.textContent;
            btn.textContent = '✅ Скопировано!';
            setTimeout(() => {
                btn.textContent = originalText;
            }, 2000);
        };
        
        // ============================================
        // WebRTC функции
        // ============================================
        async function createPeerConnection() {
            peerConnection = new RTCPeerConnection(configuration);
            
            if (localStream) {
                localStream.getTracks().forEach(track => {
                    peerConnection.addTrack(track, localStream);
                });
            }
            
            peerConnection.ontrack = (event) => {
                console.log('📹 Получен поток от собеседника');
                remoteVideo.srcObject = event.streams[0];
                updateStatus('🟢 В соединении! Вы разговариваете', 'success');
            };
            
            peerConnection.onicecandidate = (event) => {
                if (event.candidate) {
                    sendSignal('ice-candidate', {
                        candidate: event.candidate
                    });
                }
            };
            
            peerConnection.oniceconnectionstatechange = () => {
                console.log('ICE состояние:', peerConnection.iceConnectionState);
                if (peerConnection.iceConnectionState === 'failed') {
                    updateStatus('🔴 Не удалось установить соединение', 'error');
                }
            };
            
            peerConnection.onconnectionstatechange = () => {
                console.log('Состояние соединения:', peerConnection.connectionState);
                if (peerConnection.connectionState === 'connected') {
                    updateStatus('🟢 Соединение установлено!', 'success');
                } else if (peerConnection.connectionState === 'disconnected') {
                    updateStatus('🟡 Соединение потеряно...', 'error');
                }
            };
        }
        
        async function createOffer() {
            if (!peerConnection) {
                await createPeerConnection();
            }
            
            if (peerConnection.signalingState !== 'stable') {
                console.log('Состояние не stable, ждем...');
                return;
            }
            
            try {
                const offer = await peerConnection.createOffer();
                await peerConnection.setLocalDescription(offer);
                
                sendSignal('offer', {
                    sdp: peerConnection.localDescription.sdp,
                    type: peerConnection.localDescription.type
                });
                
                updateStatus('🟣 Приглашение отправлено...');
            } catch (error) {
                console.error('Ошибка создания offer:', error);
            }
        }
        
        async function handleOffer(offerData) {
            if (!peerConnection) {
                await createPeerConnection();
            }
            
            try {
                const offer = new RTCSessionDescription(offerData);
                await peerConnection.setRemoteDescription(offer);
                
                const answer = await peerConnection.createAnswer();
                await peerConnection.setLocalDescription(answer);
                
                sendSignal('answer', {
                    sdp: peerConnection.localDescription.sdp,
                    type: peerConnection.localDescription.type
                });
                
                updateStatus('🟢 Соединение устанавливается...');
            } catch (error) {
                console.error('Ошибка обработки offer:', error);
            }
        }
        
        async function handleAnswer(answerData) {
            if (!peerConnection) return;
            
            try {
                const answer = new RTCSessionDescription(answerData);
                await peerConnection.setRemoteDescription(answer);
                updateStatus('🟢 Соединение установлено!', 'success');
            } catch (error) {
                console.error('Ошибка обработки answer:', error);
            }
        }
        
        async function handleIceCandidate(candidateData) {
            if (!peerConnection) return;
            
            try {
                const candidate = new RTCIceCandidate(candidateData.candidate);
                await peerConnection.addIceCandidate(candidate);
            } catch (error) {
                console.error('Ошибка добавления ICE кандидата:', error);
            }
        }
        
        // ============================================
        // Firebase сигналинг
        // ============================================
        function sendSignal(type, data) {
            if (!messagesRef) return;
            
            const signalData = {
                from: myClientId,
                type: type,
                data: JSON.parse(JSON.stringify(data)),
                timestamp: Date.now()
            };
            
            push(messagesRef, signalData);
        }
        
        function initFirebaseSignaling() {
            if (!db) return;
            
            myClientId = Math.random().toString(36).substring(2, 10);
            roomId = getRoomId();
            updateRoomUrl();
            
            // Создаем ссылки на Firebase
            roomRef = ref(db, `videochat_rooms/${roomId}`);
            messagesRef = ref(db, `videochat_rooms/${roomId}/messages`);
            clientsRef = ref(db, `videochat_rooms/${roomId}/clients`);
            
            // Регистрируем клиента
            set(ref(db, `videochat_rooms/${roomId}/clients/${myClientId}`), {
                connected: true,
                timestamp: serverTimestamp()
            });
            
            // Удаляем клиента при отключении
            onDisconnect(ref(db, `videochat_rooms/${roomId}/clients/${myClientId}`)).remove();
            
            // Слушаем сообщения
            onValue(messagesRef, (snapshot) => {
                const messages = snapshot.val();
                if (!messages) return;
                
                Object.entries(messages).forEach(([key, message]) => {
                    if (message.from === myClientId) return;
                    
                    console.log('Получено сообщение:', message.type);
                    
                    switch (message.type) {
                        case 'offer':
                            handleOffer(message.data);
                            break;
                        case 'answer':
                            handleAnswer(message.data);
                            break;
                        case 'ice-candidate':
                            handleIceCandidate(message.data);
                            break;
                    }
                    
                    // Удаляем обработанное сообщение
                    remove(ref(db, `videochat_rooms/${roomId}/messages/${key}`));
                });
            });
            
            // Слушаем изменения в клиентах
            onValue(clientsRef, (snapshot) => {
                const clients = snapshot.val();
                const clientIds = clients ? Object.keys(clients) : [];
                const otherClients = clientIds.filter(id => id !== myClientId);
                
                console.log('Клиенты в комнате:', clientIds);
                
                // Если есть другой клиент и нет активного соединения
                if (otherClients.length > 0 && !peerConnection && localStream) {
                    setTimeout(() => {
                        if (!peerConnection) {
                            updateStatus('🎯 Найден собеседник, устанавливаю соединение...');
                            createOffer();
                        }
                    }, 1000);
                }
            });
            
            updateStatus('🟢 Ожидание собеседника...');
        }
        
        // ============================================
        // Инициализация медиа
        // ============================================
        async function initMedia() {
            try {
                updateStatus('🎥 Запрос доступа к камере...');
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: true,
                    audio: true
                });
                
                localStream = stream;
                localVideo.srcObject = stream;
                
                updateStatus('✅ Камера готова!', 'success');
                
                // Инициализируем сигналинг
                initFirebaseSignaling();
                
                // Настройка кнопок
                setupControls();
                
            } catch (error) {
                console.error('Ошибка:', error);
                updateStatus('❌ Ошибка доступа к камере: ' + error.message, 'error');
            }
        }
        
        function setupControls() {
            let audioEnabled = true;
            let videoEnabled = true;
            
            document.getElementById('toggleAudio').onclick = () => {
                if (localStream) {
                    audioEnabled = !audioEnabled;
                    localStream.getAudioTracks().forEach(track => {
                        track.enabled = audioEnabled;
                    });
                    document.getElementById('toggleAudio').textContent = audioEnabled ? '🔊 Выключить звук' : '🔇 Включить звук';
                }
            };
            
            document.getElementById('toggleVideo').onclick = () => {
                if (localStream) {
                    videoEnabled = !videoEnabled;
                    localStream.getVideoTracks().forEach(track => {
                        track.enabled = videoEnabled;
                    });
                    document.getElementById('toggleVideo').textContent = videoEnabled ? '📷 Выключить видео' : '🎥 Включить видео';
                }
            };
            
            document.getElementById('hangupBtn').onclick = () => {
                if (peerConnection) {
                    peerConnection.close();
                    peerConnection = null;
                }
                if (roomRef) {
                    set(roomRef, null);
                }
                remoteVideo.srcObject = null;
                updateStatus('🟡 Звонок завершен. Обновите страницу для нового звонка.');
            };
        }
        
        // Запускаем
        initMedia();
        
        // Очистка при закрытии
        window.addEventListener('beforeunload', () => {
            if (roomRef && myClientId) {
                set(ref(db, `videochat_rooms/${roomId}/clients/${myClientId}`), null);
            }
        });
    </script>
</body>
</html>
