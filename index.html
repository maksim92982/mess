<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Видеочат - Простой</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .room-info {
            background: #f0f0f0;
            padding: 15px;
            text-align: center;
            font-size: 14px;
        }

        .room-info code {
            background: #fff;
            padding: 8px 12px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 14px;
            display: inline-block;
            margin: 10px 0;
            word-break: break-all;
        }

        .videos-container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            padding: 20px;
            background: #1a1a2e;
        }

        .video-wrapper {
            flex: 1;
            min-width: 300px;
            position: relative;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            aspect-ratio: 16 / 9;
        }

        .video-wrapper video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .video-label {
            position: absolute;
            bottom: 12px;
            left: 12px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
        }

        .controls {
            padding: 20px;
            background: white;
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 24px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-danger {
            background: #dc3545;
            color: white;
        }

        .status {
            padding: 12px 20px;
            text-align: center;
            font-size: 14px;
            background: #f8f9fa;
            color: #666;
            font-family: monospace;
        }

        .status.connected {
            background: #d4edda;
            color: #155724;
        }

        .copy-btn {
            background: #28a745;
            color: white;
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-left: 10px;
        }

        @media (max-width: 768px) {
            .videos-container {
                flex-direction: column;
            }
        }
    </style>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>👨‍👩‍👧 Семейный видеочат</h1>
            <p>Простой видеочат для двоих</p>
        </div>
        
        <div class="room-info">
            🔗 Ваша ссылка для общения:
            <div>
                <code id="roomUrl">Загрузка...</code>
                <button class="copy-btn" onclick="copyRoomUrl()">📋 Копировать</button>
            </div>
            <small style="display: block; margin-top: 8px;">👉 Отправьте эту ссылку собеседнику</small>
        </div>
        
        <div class="videos-container">
            <div class="video-wrapper">
                <video id="localVideo" autoplay muted playsinline></video>
                <div class="video-label">📹 Вы</div>
            </div>
            <div class="video-wrapper">
                <video id="remoteVideo" autoplay playsinline></video>
                <div class="video-label">👤 Собеседник</div>
            </div>
        </div>
        
        <div class="controls">
            <button id="toggleAudio" class="btn-primary">🔊 Выключить звук</button>
            <button id="toggleVideo" class="btn-primary">📷 Выключить видео</button>
            <button id="hangupBtn" class="btn-danger">📞 Завершить звонок</button>
        </div>
        
        <div class="status" id="status">
            🟡 Инициализация...
        </div>
    </div>

    <script>
        // ============================================
        // Простой видеочат с использованием PeerJS
        // НЕ ТРЕБУЕТ FIREBASE!
        // ============================================
        
        let localStream = null;
        let remoteStream = null;
        let peer = null;
        let currentCall = null;
        let myId = null;
        
        const localVideo = document.getElementById('localVideo');
        const remoteVideo = document.getElementById('remoteVideo');
        const statusDiv = document.getElementById('status');
        
        // Получаем ID комнаты из URL
        let roomId = window.location.hash.substring(1);
        if (!roomId) {
            roomId = Math.random().toString(36).substring(2, 8);
            window.location.hash = roomId;
        }
        
        // Обновляем URL в интерфейсе
        const fullUrl = window.location.href.split('#')[0] + '#' + roomId;
        document.getElementById('roomUrl').textContent = fullUrl;
        
        function copyRoomUrl() {
            const url = document.getElementById('roomUrl').textContent;
            navigator.clipboard.writeText(url);
            const btn = event.target;
            const originalText = btn.textContent;
            btn.textContent = '✅ Скопировано!';
            setTimeout(() => {
                btn.textContent = originalText;
            }, 2000);
        }
        
        function updateStatus(message, isConnected = false) {
            statusDiv.textContent = message;
            statusDiv.className = 'status';
            if (isConnected) {
                statusDiv.classList.add('connected');
            }
            console.log(message);
        }
        
        // Получаем доступ к камере и микрофону
        async function initMedia() {
            try {
                updateStatus('🎥 Запрос доступа к камере...');
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: true,
                    audio: true
                });
                
                localStream = stream;
                localVideo.srcObject = stream;
                
                updateStatus('✅ Камера готова! Подключаюсь к серверу...');
                
                // Подключаемся к PeerJS серверу
                initPeer();
                
            } catch (error) {
                updateStatus('❌ Ошибка: ' + error.message);
                console.error(error);
            }
        }
        
        function initPeer() {
            // Создаем Peer с нашим ID комнаты
            // Используем публичный сервер PeerJS
            peer = new Peer(roomId, {
                host: '0.peerjs.com',
                port: 443,
                path: '/',
                secure: true,
                config: {
                    iceServers: [
                        { urls: 'stun:stun.l.google.com:19302' },
                        { urls: 'stun:stun1.l.google.com:19302' },
                        {
                            urls: 'turn:openrelay.metered.ca:80',
                            username: 'openrelayproject',
                            credential: 'openrelayproject'
                        }
                    ]
                }
            });
            
            peer.on('open', (id) => {
                myId = id;
                updateStatus(`🟢 Подключен! ID: ${id}`);
                console.log('Мой ID:', id);
                
                // Если есть уже звонок, не создаем новый
                if (!currentCall) {
                    // Небольшая задержка, чтобы дать возможность второму участнику подключиться
                    setTimeout(() => {
                        // Пытаемся позвонить, если мы не в звонке
                        if (!currentCall && localStream) {
                            makeCall();
                        }
                    }, 2000);
                }
            });
            
            peer.on('error', (error) => {
                console.error('Peer error:', error);
                if (error.type === 'unavailable-id') {
                    updateStatus('⚠️ Кто-то уже использует эту ссылку! Пытаюсь подключиться...');
                    // Если ID занят, значит мы второй участник - просто ждем звонка
                    waitForCall();
                } else {
                    updateStatus('❌ Ошибка: ' + error.message);
                }
            });
            
            peer.on('call', (call) => {
                console.log('Входящий звонок!');
                updateStatus('📞 Входящий звонок...');
                answerCall(call);
            });
        }
        
        function makeCall() {
            if (!peer || !localStream) return;
            
            console.log('Пытаюсь позвонить по ID:', roomId);
            
            // Пробуем позвонить
            const call = peer.call(roomId, localStream);
            setupCallHandlers(call);
            currentCall = call;
            updateStatus('📞 Звонок...');
        }
        
        function waitForCall() {
            updateStatus('🟡 Ожидание звонка от собеседника...');
            // Просто ждем, когда кто-то позвонит
        }
        
        function answerCall(call) {
            if (!localStream) return;
            
            call.answer(localStream);
            setupCallHandlers(call);
            currentCall = call;
            updateStatus('🟢 Соединение устанавливается...');
        }
        
        function setupCallHandlers(call) {
            call.on('stream', (remoteStreamObj) => {
                console.log('Получен поток от собеседника');
                remoteStream = remoteStreamObj;
                remoteVideo.srcObject = remoteStream;
                updateStatus('🟢 В соединении! Вы разговариваете', true);
            });
            
            call.on('close', () => {
                console.log('Звонок завершен');
                remoteVideo.srcObject = null;
                currentCall = null;
                updateStatus('🟡 Звонок завершен. Обновите страницу для нового звонка.');
            });
            
            call.on('error', (error) => {
                console.error('Call error:', error);
                updateStatus('❌ Ошибка соединения: ' + error.message);
            });
        }
        
        // Настройка кнопок
        function setupControls() {
            let audioEnabled = true;
            let videoEnabled = true;
            
            document.getElementById('toggleAudio').onclick = () => {
                if (localStream) {
                    audioEnabled = !audioEnabled;
                    localStream.getAudioTracks().forEach(track => {
                        track.enabled = audioEnabled;
                    });
                    document.getElementById('toggleAudio').textContent = audioEnabled ? '🔊 Выключить звук' : '🔇 Включить звук';
                }
            };
            
            document.getElementById('toggleVideo').onclick = () => {
                if (localStream) {
                    videoEnabled = !videoEnabled;
                    localStream.getVideoTracks().forEach(track => {
                        track.enabled = videoEnabled;
                    });
                    document.getElementById('toggleVideo').textContent = videoEnabled ? '📷 Выключить видео' : '🎥 Включить видео';
                }
            };
            
            document.getElementById('hangupBtn').onclick = () => {
                if (currentCall) {
                    currentCall.close();
                }
                if (peer) {
                    peer.destroy();
                }
                updateStatus('🟡 Звонок завершен. Обновите страницу для нового звонка.');
            };
        }
        
        // Запускаем
        initMedia();
        setupControls();
        
        // Очистка при закрытии
        window.addEventListener('beforeunload', () => {
            if (currentCall) {
                currentCall.close();
            }
            if (peer) {
                peer.destroy();
            }
        });
    </script>
</body>
</html>
